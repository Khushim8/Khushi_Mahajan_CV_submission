

data:
  dataset_dir: 'dataset'         # dataset path 
  image_size: 224                 
  num_workers: 0

model:
  backbone: "efficientnet_b0"     # pretrained ImageNet 
  num_classes: 5
  dropout: 0.3

training:
  epochs: 15
  batch_size: 32
  learning_rate: 1.0e-3           
  fine_tune_lr: 1.0e-4            # full-network fine-tune phase
  fine_tune_epoch: 8              # unfreeze backbone after this epoch
  weight_decay: 1.0e-4
  seed: 42

output:
  predictions_csv: "predictions.csv"
  model_checkpoint: "outputs/best_model.pth"
  log_file: "outputs/training.log"
